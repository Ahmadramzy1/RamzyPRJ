name: Build Android APK

on:
  workflow_dispatch:

env:
  ACTIONS_RUNNER_FORCE_NODE_JS: '20'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    permissions:
      contents: read
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@main

    - name: Setup Node.js
      uses: actions/setup-node@main
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@main
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Fix Node Modules Permissions
      run: chmod -R +x node_modules/.bin

    - name: Ensure Vite Config
      run: |
        if [ ! -f vite.config.js ]; then
          echo "import { defineConfig } from 'vite';" > vite.config.js
          echo "export default defineConfig({ build: { outDir: 'www' } });" >> vite.config.js
        fi

    - name: Build Web App (Vite)
      run: npm run build

    - name: Setup Capacitor Config
      run: |
        if [ ! -f capacitor.config.json ]; then
          npx cap init "دفتر حساب" "com.studio.invoice" --web-dir=www
        else
          node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('capacitor.config.json','utf8')); c.webDir='www'; fs.writeFileSync('capacitor.config.json', JSON.stringify(c, null, 2));"
        fi

    - name: Add Android platform
      run: if [ ! -d "android" ]; then npx cap add android; fi

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Make Gradle Executable
      run: chmod +x android/gradlew

    - name: Build APK
      run: cd android && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Invoice-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
