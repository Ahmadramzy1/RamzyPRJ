name: Build Android APK

on:
  workflow_dispatch:

env:
  ACTIONS_RUNNER_FORCE_NODE_JS: '20'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    permissions:
      contents: read
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@main

    - name: Setup Node.js
      uses: actions/setup-node@main
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@main
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    # اضافه شدن مرحله بیلد وب (اگر از ریکت/ویو استفاده می‌کنید این خط کار شما را راه می‌اندازد)
    - name: Build Web App
      run: npm run build

    # ساخت تنظیمات کپاسیتور با پوشه صحیح (به جای نقطه)
    - name: Initialize Capacitor
      run: if [ ! -f capacitor.config.json ]; then npx cap init "دفتر حساب" "com.studio.invoice" --web-dir=www; fi

    # اگر پوشه www وجود نداشت، آن را می‌سازد و فایل‌های بیلد شده را آنجا می‌ریزد
    - name: Ensure www directory exists
      run: |
        if [ ! -d "www" ]; then
          mkdir www
          # اگر خروجی بیلد شما در پوشه دیگری (مثل dist) است، آن را اینجا کپی می‌کنیم
          if [ -d "dist" ]; then
            cp -r dist/* www/
          elif [ -f "index.html" ]; then
            cp -r *.html *.js *.css assets www/ 2>/dev/null || true
          fi
        fi

    - name: Add Android platform
      run: npx cap add android

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Make Gradle Executable
      run: chmod +x android/gradlew

    - name: Build APK
      run: cd android && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Invoice-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
